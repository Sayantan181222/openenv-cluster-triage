---
# OpenEnv Specification — Cluster Triage Environment
# Validate with: openenv validate

name: cluster-triage-env
version: "1.0.0"
description: >
  Enterprise 4-node distributed data cluster triage environment.
  An AI agent acting as an automated Site Reliability Engineer (SRE)
  must observe cluster health metrics and issue precise terminal commands
  to prevent cascading infrastructure failures.

author: "Team SoonValley"
license: "MIT"

tags:
  - openenv
  - infrastructure
  - devops
  - sre
  - distributed-systems
  - real-world

# ── Observation Space ────────────────────────────────────────────────────────
observation_space:
  type: object
  description: "Full cluster state snapshot delivered to the agent each step"
  properties:
    health_score:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: "Continuous cluster stability metric"
    nodes:
      type: array
      description: "List of 4 NodeStatus objects (worker_01 to worker_04)"
      items:
        type: object
        properties:
          node_id:    { type: string }
          status:     { type: string, enum: [healthy, high_memory, disk_full, offline] }
          cpu_usage:  { type: number }
          ram_usage:  { type: number }
          disk_usage: { type: number }
    active_jobs:
      type: array
      description: "Jobs currently running or hanging on the cluster"
      items:
        type: object
        properties:
          job_id:        { type: string }
          status:        { type: string, enum: [running, hanging, queued, failed] }
          ram_allocated: { type: number }
    recent_alerts:
      type: array
      items: { type: string }
      description: "System log messages and critical alerts"

# ── Action Space ─────────────────────────────────────────────────────────────
action_space:
  type: object
  description: "A single terminal command to execute on the cluster"
  properties:
    action_type:
      type: string
      enum: [kill_job, restart_node, clear_temp_storage, noop]
      description: "The command to execute"
    target_id:
      type: string
      description: "The job_id (e.g. job_rogue_99) or node_id (e.g. worker_01) to target"

# ── Tasks ─────────────────────────────────────────────────────────────────────
tasks:
  - id: easy
    description: >
      THE STUCK JOB: A rogue MapReduce job (job_rogue_99) is stuck in an infinite
      loop consuming all available RAM on worker_01. The agent must identify and
      terminate it in a single action.
    difficulty: easy
    difficulty_score: 1
    max_steps: 5
    win_condition: "kill_job on job_rogue_99"
    expected_score: 1.0

  - id: medium
    description: >
      THE FULL DISK: Worker node worker_03 has hit 99.9% disk capacity causing all
      HDFS writes to fail. The agent must clear temporary storage first, then restart
      the node in the correct order.
    difficulty: medium
    difficulty_score: 2
    max_steps: 10
    win_condition: "clear_temp_storage on worker_03, then restart_node on worker_03"
    expected_score: 1.0

  - id: hard
    description: >
      CASCADE FAILURE: A rogue job triggered a replication storm that crashed nodes
      worker_01 and worker_02. The agent must kill the root cause job, clear storage
      on both offline nodes (order matters — rogue job must be killed first or disks
      refill), then reboot both nodes safely.
    difficulty: hard
    difficulty_score: 3
    max_steps: 15
    win_condition: "kill job_rogue_99, clear worker_01, clear worker_02, restart worker_01, restart worker_02"
    expected_score: 1.0

  - id: very_hard
    description: >
      MULTI-VECTOR ATTACK: Two simultaneous malware jobs — a disk-filling log spammer
      (job_log_spam) targeting nodes 1&2, and a RAM-hogging crypto miner (job_crypto_miner)
      targeting nodes 3&4. The agent must terminate both malware instances before
      storage recovery or face re-infection penalties.
    difficulty: very_hard
    difficulty_score: 4
    max_steps: 20
    win_condition: "kill both malware jobs, clear nodes 1&2, restart nodes 1&2"
    expected_score: 1.0

  - id: nightmare
    description: >
      THE HYDRA PROTOCOL: Total cluster collapse. All 4 nodes are offline, all disks
      at 100%. Three self-replicating malware jobs are writing garbage data simultaneously.
      The Hydra mechanic: if ANY job survives when storage is cleared, it instantly
      cross-infects and refills the disk to 100%. The agent must kill ALL THREE Hydra
      jobs before attempting any storage operations, then clear and reboot all 4 nodes.
    difficulty: nightmare
    difficulty_score: 5
    max_steps: 25
    win_condition: "kill hydra_1, hydra_2, hydra_3, clear all 4 nodes, restart all 4 nodes"
    expected_score: 1.0

# ── Reward Design ─────────────────────────────────────────────────────────────
reward_design:
  type: shaped
  description: >
    Continuous shaped rewards provide signal across the full trajectory.
    Each correct intermediate step yields partial credit (+0.1 to +0.5).
    Incorrect ordering (e.g., restarting before clearing) yields penalties (-0.1 to -0.3).
    Surviving Hydra jobs trigger heavy penalties (-0.15) to prevent exploitation.
    Episode terminates on task completion (max reward 1.0) or max_steps timeout.

# ── Baseline ─────────────────────────────────────────────────────────────────
baseline:
  model: "deepseek-ai/DeepSeek-R1-Distill-Llama-70B"
  script: "inference.py"
  scores:
    easy:      1.0
    medium:    1.0
    hard:      1.0
    very_hard: 1.0
    nightmare: 1.0

# ── Deployment ────────────────────────────────────────────────────────────────
deployment:
  platform: huggingface_spaces
  space_id: "soonvalley04/scaler-openenv-cluster-triage"
  sdk: docker
  port: 7860
  health_endpoint: "/health"
  api_endpoints:
    reset: "POST /reset"
    step:  "POST /step"
    state: "GET /state"
